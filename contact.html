<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontak - AssitBro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

  <nav class="bg-gray-800 px-10 py-5 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-500">AssitBro</h1>

    <div class="space-x-6">
      <a href="index.html" class="hover:text-blue-400">Home</a>
      <a href="about.html" class="hover:text-blue-400">Tentang</a>
      <a href="services.html" class="hover:text-blue-400">Layanan</a>
      <a href="portfolio.html" class="hover:text-blue-400">Portfolio</a>
      <a href="contact.html" class="text-blue-400 font-semibold">Kontak</a>
      <a href="login.html" class="hover:text-blue-400">Login</a>
    </div>
  </nav>

  <section class="py-20 px-10 max-w-2xl mx-auto">
    <h2 class="text-3xl font-bold mb-6">Hubungi Kami</h2>

    <p class="mb-2">Email: admin@assitbro.com</p>
    <p class="mb-6">Phone: 08123456789</p>

    <h3 class="font-semibold mb-3">Sosial Media</h3>

    <ul class="space-y-2 text-gray-400">
      <li>Instagram: @assitbro</li>
      <li>Facebook: AssitBro Official</li>
      <li>TikTok: @assitbro.id</li>
    </ul>
      <!-- FORM REQUEST -->
    <form id="contactForm" class="mt-10 space-y-4">

      <input 
      type="text" 
      id="name" 
      placeholder="Nama"
      class="w-full p-3 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500"
      required
      >

      <input 
      type="email" 
      id="email" 
      placeholder="Email"
      class="w-full p-3 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500"
      required
      >

      <textarea 
      id="message" 
      placeholder="Tulis request kamu..."
      rows="4"
      class="w-full p-3 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500"
      required
      ></textarea>

      <button 
      type="submit"
      class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded font-semibold"
      >
      Kirim Request
      </button>

    </form>

  </section>

  <footer class="bg-gray-800 text-center py-6 text-gray-400">
    © 2026 AssitBro
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
