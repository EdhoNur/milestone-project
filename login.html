<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AssitBro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

  <nav class="bg-gray-800 px-10 py-5 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-500">AssitBro</h1>

    <div class="space-x-6">
      <a href="index.html" class="hover:text-blue-400">Home</a>
      <a href="login.html" class="text-blue-400 font-semibold">Login</a>
    </div>
  </nav>

  <section class="flex items-center justify-center py-20">
    <div class="bg-gray-800 p-8 rounded-lg w-80">
      <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

      <form id="loginForm" class="space-y-4">
        <input 
          type="email" 
          id="loginEmail"
          placeholder="Email"
          class="w-full p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >
        <input 
          type="password" 
          id="loginPassword"
          placeholder="Password"
          class="w-full p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >
        <button 
          type="submit"
          class="w-full py-3 bg-blue-600 rounded hover:bg-blue-700 transition duration-300"
        >Login
        </button>
      </form>
      
      <p class="text-center text-gray-400 mt-4 text-sm">
        Belum punya akun?
        <a href="register.html" class="text-blue-400">Register</a>
      </p>
    </div>
  </section>

  <footer class="bg-gray-800 text-center py-6 text-gray-400">
    © 2026 AssitBro
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
