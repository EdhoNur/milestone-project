<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AssistBro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

  <!-- Navbar -->
  <nav class="bg-gray-800 px-10 py-5 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-500">AssistBro</h1>

    <div class="space-x-6">
      <a href="index.html" class="hover:text-blue-400 transition duration-300">
        Home
      </a>
      <a href="register.html" class="text-blue-400 font-semibold">
        Register
      </a>
    </div>
  </nav>

  <!-- Register Section -->
  <section class="flex items-center justify-center py-20">
    <div class="bg-gray-800 p-8 rounded-lg w-96 shadow-lg">
      <h2 class="text-2xl font-bold mb-6 text-center">
        Daftar Akun
      </h2>

      <form id="registerForm" class="space-y-4">

        <input 
          type="text" 
          id="username" 
          placeholder="Username"
          class="w-full p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >

        <input 
          type="email" 
          id="email" 
          placeholder="Email"
          class="w-full p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >

        <input 
          type="password" 
          id="password" 
          placeholder="Password"
          class="w-full p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >

        <input 
          type="password" 
          id="confirmPassword" 
          placeholder="Konfirmasi Password"
          class="w-full p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          required
        >

        <button 
          type="submit"
          class="w-full py-3 bg-blue-600 rounded hover:bg-blue-700 transition duration-300"
        >
          Daftar
        </button>

      </form>

      <!-- Link ke Login -->
      <p class="text-center text-gray-400 mt-4 text-sm">
        Sudah punya akun?
        <a href="login.html" class="text-blue-400 hover:underline">
          Login di sini
        </a>
      </p>

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-center py-6 text-gray-400">
    © 2026 AssistBro — Siap bantu kamu bro!
  </footer>

  <!-- Script -->
  <script src="js/script.js"></script>

</body>
</html>
